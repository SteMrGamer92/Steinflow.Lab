<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferma Email - Solitaire Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #073B3A;
            --card-bg: rgba(30, 77, 82, 0.85);
            --accent-yellow: #FFE600;
            --accent-green: #37FFB4;
            --text-white: #FFFFFF;
            --glass-border: rgba(255, 255, 255, 0.1);
            --error-red: #f87171;
            --success-green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(55, 255, 180, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 230, 0, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-white);
            padding: 2rem;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M30 10c-2.2 0-4 1.8-4 4 0 2 2.5 5 4 6 1.5-1 4-4 4-6 0-2.2-1.8-4-4-4zm0 30c2.2 0 4-1.8 4-4 0-2-2.5-5-4-6-1.5 1-4 4-4 6 0 2.2 1.8 4 4 4zM10 30c0 2.2 1.8 4 4 4 2 0 5-2.5 6-4-1-1.5-4-4-4-4-2.2 0-4 1.8-4 4zm40 0c0-2.2-1.8-4-4-4-2 0-5 2.5-6 4 1 1.5 4 4 4 4 2.2 0 4-1.8 4-4z'/%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-out;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255,230,0,0.4);
        }
        .logo p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 2rem; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.5;
            display: none;
        }
        .msg.error   { background: rgba(248,113,113,0.15); color: var(--error-red);    border: 1px solid rgba(248,113,113,0.3); display: block; }
        .msg.success { background: rgba(74,222,128,0.15);  color: var(--success-green); border: 1px solid rgba(74,222,128,0.3);  display: block; }
        .msg.info    { background: rgba(255,255,255,0.05); color: var(--text-white);    border: 1px solid var(--glass-border);   display: block; }
        .subtitle { font-size: 0.85rem; opacity: 0.6; margin-top: 1rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>Solitaire Pulse</h1>
            <p data-i18n="verifyAccount">Verifica account</p>
        </div>
        <div id="icon" class="icon">⏳</div>
        <div id="msg" class="msg info" data-i18n="verifying">Verifica in corso...</div>
        <p id="subtitle" class="subtitle"></p>
    </div>

    <script>
        // --- LOCALIZATION (i18n) ---
        const translations = {
            en: {
                verifyAccount: "Verify account",
                verifying: "Verifying...",
                invalidLink: "Invalid link. Request a new confirmation email from the app.",
                expiredLink: "Invalid or expired link. Request a new confirmation email from the app.",
                emailUpdated: "✓ Email updated successfully!",
                emailUpdatedSubtitle: "You can return to the app.",
                accountConfirmed: "✓ Account confirmed! Welcome to Solitaire Pulse.",
                accountConfirmedSubtitle: "You can return to the app and log in."
            },
            it: {
                verifyAccount: "Verifica account",
                verifying: "Verifica in corso...",
                invalidLink: "Link non valido. Richiedi una nuova email di conferma dalla app.",
                expiredLink: "Link non valido o scaduto. Richiedi una nuova email di conferma dalla app.",
                emailUpdated: "✓ Email aggiornata con successo!",
                emailUpdatedSubtitle: "Puoi tornare alla app.",
                accountConfirmed: "✓ Account confermato! Benvenuto in Solitaire Pulse.",
                accountConfirmedSubtitle: "Puoi tornare alla app e fare il login."
            }
        }

        // Detect browser language
        const browserLang = navigator.language.slice(0, 2)
        const currentLang = ['en', 'it'].includes(browserLang) ? browserLang : 'en'
        const t = translations[currentLang]

        // Apply translations
        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n')
                if (t[key]) el.textContent = t[key]
            })
        }

        applyTranslations()

        // Update document language
        document.documentElement.lang = currentLang

        const SUPABASE_URL  = 'https://ipqxjudlxcqacgtmpkzx.supabase.co'
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwcXhqdWRseGNxYWNndG1wa3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkxMjY1NzksImV4cCI6MjA3NDcwMjU3OX0.ojU2aniXnbL1w5xZjDgewVJo5sMPNHXz-0_wgXaNd1E'

        const { createClient } = supabase
        const client = createClient(SUPABASE_URL, SUPABASE_ANON)

        const iconEl    = document.getElementById('icon')
        const msgEl     = document.getElementById('msg')
        const subtitleEl = document.getElementById('subtitle')

        function showResult(icon, text, type, subtitle = '') {
            iconEl.textContent = icon
            msgEl.textContent = text
            msgEl.className = 'msg ' + type
            subtitleEl.textContent = subtitle
        }

        async function init() {
            const params = new URLSearchParams(window.location.search)
            const tokenHash = params.get('token_hash')
            const type      = params.get('type') // 'email' per signup, 'email_change' per cambio email

            if (!tokenHash || !type) {
                showResult('❌', t.invalidLink, 'error')
                return
            }

            const { error } = await client.auth.verifyOtp({
                token_hash: tokenHash,
                type: type === 'email_change' ? 'email_change' : 'email'
            })

            if (error) {
                showResult('❌', t.expiredLink, 'error', error.message)
                return
            }

            if (type === 'email_change') {
                showResult('✓', t.emailUpdated, 'success', t.emailUpdatedSubtitle)
            } else {
                showResult('✓', t.accountConfirmed, 'success', t.accountConfirmedSubtitle)
            }
        }

        init()
    </script>
</body>
</html>
