<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Solitaire Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #073B3A;
            --card-bg: rgba(30, 77, 82, 0.85);
            --accent-yellow: #FFE600;
            --accent-green: #37FFB4;
            --text-white: #FFFFFF;
            --glass-border: rgba(255, 255, 255, 0.1);
            --error-red: #f87171;
            --success-green: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(55, 255, 180, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 230, 0, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-white);
            overflow-x: hidden;
            padding: 2rem;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M30 10c-2.2 0-4 1.8-4 4 0 2 2.5 5 4 6 1.5-1 4-4 4-6 0-2.2-1.8-4-4-4zm0 30c2.2 0 4-1.8 4-4 0-2-2.5-5-4-6-1.5 1-4 4-4 6 0 2.2 1.8 4 4 4zM10 30c0 2.2 1.8 4 4 4 2 0 5-2.5 6-4-1-1.5-4-4-4-4-2.2 0-4 1.8-4 4zm40 0c0-2.2-1.8-4-4-4-2 0-5 2.5-6 4 1 1.5 4 4 4 4 2.2 0 4-1.8 4-4z'/%3E%3C/g%3E%3C/svg%3E");
            z-index: -1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(255, 230, 0, 0.4);
        }

        .logo p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 2rem;
        }

        .field {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            color: var(--text-white);
            outline: none;
            transition: all 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--accent-green);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 15px rgba(55, 255, 180, 0.1);
        }

        .hint {
            font-size: 0.75rem;
            opacity: 0.5;
            margin-top: 0.4rem;
        }

        button {
            width: 100%;
            background: var(--accent-yellow);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(255, 230, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 230, 0, 0.3);
            filter: brightness(1.1);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            margin-top: 1.5rem;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            display: none;
            line-height: 1.4;
        }

        .msg.error {
            background: rgba(248, 113, 113, 0.15);
            color: var(--error-red);
            border: 1px solid rgba(248, 113, 113, 0.3);
            display: block;
        }

        .msg.success {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success-green);
            border: 1px solid rgba(74, 222, 128, 0.3);
            display: block;
        }

        .msg.info {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            border: 1px solid var(--glass-border);
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>Solitaire Pulse</h1>
            <p>Imposta una nuova password</p>
        </div>

        <div id="loading" class="msg info">Verifica in corso...</div>
        <div id="msg" class="msg"></div>

        <form id="form" style="display:none;">
            <div class="field">
                <label for="password">Nuova password</label>
                <input type="password" id="password" placeholder="Almeno 8 caratteri" autocomplete="new-password">
                <p class="hint">Usa una password sicura.</p>
            </div>
            <div class="field">
                <label for="confirm">Conferma password</label>
                <input type="password" id="confirm" placeholder="Ripeti la password" autocomplete="new-password">
            </div>
            <button type="submit" id="btn">Aggiorna password</button>
        </form>
    </div>

    <script>
        // --- CONFIGURAZIONE SUPABASE ---
        // Ricordati di inserire la tua ANON KEY se non è già configurata
        const SUPABASE_URL = 'https://ipqxjudlxcqacgtmpkzx.supabase.co'
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwcXhqdWRseGNxYWNndG1wa3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkxMjY1NzksImV4cCI6MjA3NDcwMjU3OX0.ojU2aniXnbL1w5xZjDgewVJo5sMPNHXz-0_wgXaNd1E' // <--- INSERISCI QUI LA TUA ANON KEY

        const { createClient } = supabase
        const client = createClient(SUPABASE_URL, SUPABASE_ANON)

        const loadingEl = document.getElementById('loading')
        const msgEl = document.getElementById('msg')
        const formEl = document.getElementById('form')
        const btnEl = document.getElementById('btn')

        function showMsg(text, type) {
            msgEl.textContent = text
            msgEl.className = 'msg ' + type
            msgEl.style.display = 'block'
        }

        async function init() {
            const params = new URLSearchParams(window.location.search)
            const hash   = new URLSearchParams(window.location.hash.replace('#', ''))

            const code        = params.get('code')
            const tokenHash   = params.get('token_hash') || hash.get('token_hash')
            const accessToken = hash.get('access_token')
            const type        = params.get('type') || hash.get('type')

            // Caso 1: ?code= — flusso PKCE attuale di Supabase
            if (code) {
                const { error } = await client.auth.exchangeCodeForSession(code)
                if (error) {
                    loadingEl.style.display = 'none'
                    showMsg('Link non valido o scaduto. Richiedi un nuovo reset dalla app.', 'error')
                    return
                }
                loadingEl.style.display = 'none'
                formEl.style.display = 'block'
                window.history.replaceState({}, '', window.location.pathname)
                return
            }

            // Caso 2: #access_token= — Implicit Flow legacy
            if (accessToken) {
                const { error } = await client.auth.setSession({
                    access_token: accessToken,
                    refresh_token: hash.get('refresh_token')
                })
                if (error) {
                    loadingEl.style.display = 'none'
                    showMsg('Link non valido o scaduto. Richiedi un nuovo reset.', 'error')
                    return
                }
                loadingEl.style.display = 'none'
                formEl.style.display = 'block'
                return
            }

            // Caso 3: ?token_hash= — PKCE legacy
            if (tokenHash && type === 'recovery') {
                const { error } = await client.auth.verifyOtp({
                    token_hash: tokenHash,
                    type: 'recovery'
                })
                if (error) {
                    loadingEl.style.display = 'none'
                    showMsg('Link non valido o scaduto. Richiedi un nuovo reset dalla app.', 'error')
                    return
                }
                loadingEl.style.display = 'none'
                formEl.style.display = 'block'
                return
            }

            loadingEl.style.display = 'none'
            showMsg('Nessun token trovato. Usa il link ricevuto via email.', 'error')
        }

        formEl.addEventListener('submit', async (e) => {
            e.preventDefault()
            const pwd     = document.getElementById('password').value
            const confirm = document.getElementById('confirm').value

            if (pwd.length < 8) { showMsg('La password deve avere almeno 8 caratteri.', 'error'); return }
            if (pwd !== confirm) { showMsg('Le password non coincidono.', 'error'); return }

            btnEl.disabled = true
            btnEl.textContent = 'Aggiornamento...'

            const { error } = await client.auth.updateUser({ password: pwd })

            if (error) {
                showMsg('Errore: ' + error.message, 'error')
                btnEl.disabled = false
                btnEl.textContent = 'Aggiorna password'
                return
            }

            formEl.style.display = 'none'
            showMsg('✓ Password aggiornata! Puoi tornare alla app e fare il login.', 'success')
        })

        init()
    </script>
</body>

</html>
